services:
  db:
    image: mysql:8.4
    container_name: unistock-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-12345}
      MYSQL_DATABASE: ${DB_NAME:-p5}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-12345}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: unistock
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_HOST: db
      DJANGO_SUPERUSER_EMAIL: admin@email.com
      DJANGO_SUPERUSER_PASSWORD: UNIFIP@123

volumes:
  mysql_data:
